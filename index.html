<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biblia Sacra</title>
	
    <link rel="icon" href="./appicon.svg" type="image/svg+xml">
    <meta property="og:title" content="Sancta Biblia">
    <meta property="og:description" content="A modern Bible reading app with personal notes and highlights.">
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Google Fonts Expansion -->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;600;700&family=Tinos:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Tailwind 3D Glass Morphism & AMOLED Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            safelist: [
                'border-yellow-400', 'border-green-400', 'border-blue-400', 'border-pink-400', 'border-purple-400',
                'border-yellow-500', 'border-green-500', 'border-blue-500', 'border-pink-500', 'border-purple-500',
                'bg-yellow-400', 'bg-green-400', 'bg-blue-400', 'bg-pink-400', 'bg-purple-400',
            ],
            theme: {
                extend: {
                    colors: {
                        amoled: '#000000',
                        primary: 'var(--color-primary)',
                        'primary-hover': 'var(--color-primary-hover)',
                        'primary-glow': 'var(--color-primary-glow)',
                    },
                    boxShadow: {
                        'glass-light': '0 8px 32px 0 rgba(31, 38, 135, 0.07), inset 0 1px 1px rgba(255, 255, 255, 0.8)',
                        'glass-dark': '0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05)',
                        '3d-btn': '0 4px 6px -1px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.25)',
                        'glow-primary': '0 0 20px var(--color-primary-glow)',
                    }
                }
            }
        }
    </script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCCDq-rvjw_o3APjQRT4EfWRWDFdUgu26Y",
          authDomain: "sanctabiblia.firebaseapp.com",
          projectId: "sanctabiblia",
          storageBucket: "sanctabiblia.appspot.com",
          messagingSenderId: "695688083334",
          appId: "1:695688083334:web:3a030b5ade0c8af0061e07",
          measurementId: "G-05GGC9MFS5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebase = {
            auth, db, GoogleAuthProvider, signInWithPopup, onAuthStateChanged,
            createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, doc, setDoc, getDoc
        };
    </script>

    <style>
        :root {
            /* Dynamic settings controlled by JS */
            --font-size-base: 1.125rem;
            --line-height-base: 1.75rem;
            --font-family-base: 'Tinos';
            
            /* Accent Colors (Default: Indigo) */
            --color-primary: #4f46e5;
            --color-primary-hover: #4338ca;
            --color-primary-glow: rgba(79, 70, 229, 0.4);
        }

        /* Ambient AMOLED Background Elements */
        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }
        .dark .ambient-blob {
            opacity: 0.05; /* Barely visible in dark mode to maintain AMOLED true black */
        }

        html.dark { color-scheme: dark; }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        html.dark body {
            background-color: #000000; /* True AMOLED Black */
            color: #f3f4f6;
        }

        #scripture-display {
            font-family: var(--font-family-base), serif;
            font-size: var(--font-size-base);
            line-height: var(--line-height-base);
        }

        /* 3D Glass Morphism Panels */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07), inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }
        .dark .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        /* Glass Controls (Inputs, Selects) */
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .dark .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px var(--color-primary-glow), inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Dynamic SVG Mask for App Icon */
        .app-icon-mask {
            background-color: var(--color-primary);
            -webkit-mask: url('./appicon.svg') no-repeat center;
            mask: url('./appicon.svg') no-repeat center;
            -webkit-mask-size: contain;
            mask-size: contain;
            transition: background-color 0.5s ease;
            filter: drop-shadow(0 4px 6px var(--color-primary-glow));
        }
        .dark .app-icon-mask {
            filter: drop-shadow(0 0 12px var(--color-primary-glow));
        }

        /* 3D Buttons */
        .btn-primary {
            background: var(--color-primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.25);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 0 20px var(--color-primary-glow), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(1px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .sidebar { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar-closed-left { transform: translateX(-100%); }
        
        /* Sleek scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.8); }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
        
        /* Modern Highlighting Styles */
        .highlight-yellow { background-color: rgba(250, 204, 21, 0.25); }
        .highlight-green { background-color: rgba(74, 222, 128, 0.25); }
        .highlight-blue { background-color: rgba(96, 165, 250, 0.25); }
        .highlight-pink { background-color: rgba(244, 114, 182, 0.25); }
        .highlight-purple { background-color: rgba(192, 132, 252, 0.25); }
        
        .dark .highlight-yellow { background-color: rgba(250, 204, 21, 0.15); box-shadow: inset 0 -2px 0 0 rgba(250, 204, 21, 0.8); }
        .dark .highlight-green { background-color: rgba(74, 222, 128, 0.15); box-shadow: inset 0 -2px 0 0 rgba(74, 222, 128, 0.8); }
        .dark .highlight-blue { background-color: rgba(96, 165, 250, 0.15); box-shadow: inset 0 -2px 0 0 rgba(96, 165, 250, 0.8); }
        .dark .highlight-pink { background-color: rgba(244, 114, 182, 0.15); box-shadow: inset 0 -2px 0 0 rgba(244, 114, 182, 0.8); }
        .dark .highlight-purple { background-color: rgba(192, 132, 252, 0.15); box-shadow: inset 0 -2px 0 0 rgba(192, 132, 252, 0.8); }

        .color-swatch { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s; }
        .color-swatch:hover { transform: scale(1.15); }
        .color-swatch.selected { box-shadow: 0 0 0 3px var(--color-primary), 0 0 15px var(--color-primary-glow); border-color: transparent !important; }
        
        .tag-btn { transition: all 0.2s; }
        .tag-btn.selected { background-color: var(--color-primary); color: white; box-shadow: 0 0 12px var(--color-primary-glow); border-color: transparent; }

        #toast-notification.show { transform: translateY(0); opacity: 1; }
        
        /* Accents Pickers */
        .accent-picker.active { outline: 3px solid white; outline-offset: 2px; box-shadow: 0 0 15px currentColor; }
    </style>
</head>
<body class="transition-colors duration-500 antialiased selection:bg-primary/30 overflow-hidden">

    <!-- Mobile Floating Menu (Glass) -->

        <div class="sidebar relative flex flex-col w-80 max-w-[calc(100%-2rem)] h-full glass-panel m-2 mr-0 rounded-l-none border-l-0">

    <!-- Main Layout -->
    <div class="flex h-screen w-full relative z-10">
        
        <!-- Desktop Floating Sidebar -->
        <aside class="hidden lg:flex flex-col w-[24rem] h-full p-4 flex-shrink-0">

                    <!-- App Icon using CSS Mask for Dynamic Colors -->
                    <div class="app-icon-mask h-14 w-14 mb-2" aria-label="Sancta Logo"></div>
                    <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-primary">Holy Bible</p>

        <!-- Main Scrolling Content Area -->
        <div class="flex-1 h-full overflow-y-auto relative" id="main-scroll-area">
            <div class="container mx-auto p-4 md:p-6 lg:p-8 max-w-screen-md xl:max-w-screen-lg pt-28 lg:pt-4">
                
                <!-- Desktop Floating Version Badge -->
                <header class="hidden lg:flex items-center justify-center mb-6">

                <main id="content-area" class="glass-panel p-6 md:p-10 lg:p-14 min-h-[75vh]">
                    <div id="scripture-display-wrapper">
                        <div id="scripture-display" class="prose dark:prose-invert max-w-none leading-relaxed">
                            <div id="initial-message" class="text-center py-20">
                                <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-primary to-purple-500 shadow-glow-primary flex items-center justify-center transform rotate-3">
                                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>

                <footer class="text-center mt-12 mb-8 text-sm text-gray-400 dark:text-gray-500">
                    <p>Texts by bible-api.com & Xxruyle.</p>

        </div>

                <button id="close-login-modal-btn" class="p-2 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto space-y-5">

                    <input type="email" id="email-input" class="glass-input w-full p-3 rounded-xl outline-none" placeholder="you@example.com">
                </div>

                    <label for="password-input" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">Password</label>

    <!-- Quote Maker Modal -->
    <div id="quote-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-4 z-50 hidden transition-opacity">
        <div class="glass-panel w-full max-w-lg max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-6 border-b border-gray-200/50 dark:border-white/10">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white">Create Quote</h3>
                <button id="close-quote-modal-btn" class="p-2 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto space-y-5">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Book</label>
                        <select id="quote-book-select" class="glass-input w-full p-3 rounded-xl outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Chapter</label>

                    </div>
                    <div><label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">From Verse</label><input type="number" id="quote-verse-from" class="glass-input w-full p-3 rounded-xl outline-none" min="1"></div>
                    <div><label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">To Verse</label><input type="number" id="quote-verse-to" class="glass-input w-full p-3 rounded-xl outline-none" min="1"></div>
                </div>
                
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Version</label>
                    <select id="translation-select-quote" class="glass-input w-full p-3 rounded-xl outline-none">
                        <option value="drb" data-name="Douay-Rheims Bible" selected>Douay-Rheims</option>
                        <option value="cpdv" data-name="Catholic Public Domain Version">CPDV</option>
                        <option value="web" data-name="World English Bible: Catholic Edition">WEBC</option>
                        <option value="kjv" data-name="King James Version with the DC">KJVA</option>
                    </select>
                </div>
                
                <hr class="border-gray-200/50 dark:border-white/10">

                <div>
                     <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Typography</label>
                    <select id="quote-font-select" class="glass-input w-full p-3 rounded-xl outline-none">
                        <option value="Tinos">Tinos (Classic Serif)</option>

    <script>
        // --- DATA ---
        const BIBLE_BOOKS = {
            "Old Testament": { "Genesis": 50, "Exodus": 40, "Leviticus": 27, "Numbers": 36, "Deuteronomy": 34, "Joshua": 24, "Judges": 21, "Ruth": 4, "1 Samuel": 31, "2 Samuel": 24, "1 Kings": 22, "2 Kings": 25, "1 Chronicles": 29, "2 Chronicles": 36, "Ezra": 10, "Nehemiah": 13, "Tobit": 14, "Judith": 16, "Esther": 16, "1 Maccabees": 16, "2 Maccabees": 15, "Job": 42, "Psalms": 150, "Proverbs": 31, "Ecclesiastes": 12, "Song of Solomon": 8, "Wisdom": 19, "Sirach": 51, "Isaiah": 66, "Jeremiah": 52, "Lamentations": 5, "Baruch": 6, "Ezekiel": 48, "Daniel": 14, "Hosea": 14, "Joel": 3, "Amos": 9, "Obadiah": 1, "Jonah": 4, "Micah": 7, "Nahum": 3, "Habakkuk": 3, "Zephaniah": 3, "Haggai": 2, "Zechariah": 14, "Malachi": 4 },
            "New Testament": { "Matthew": 28, "Mark": 16, "Luke": 24, "John": 21, "Acts": 28, "Romans": 16, "1 Corinthians": 16, "2 Corinthians": 13, "Galatians": 6, "Ephesians": 6, "Philippians": 4, "Colossians": 4, "1 Thessalonians": 5, "2 Thessalonians": 3, "1 Timothy": 6, "2 Timothy": 4, "Titus": 3, "Philemon": 1, "Hebrews": 13, "James": 5, "1 Peter": 5, "2 Peter": 3, "1 John": 5, "2 John": 1, "3 John": 1, "Jude": 1, "Revelation": 22 }
        };
        
        // --- DOM Elements ---
        const scriptureDisplay = document.getElementById('scripture-display');
        const initialMessage = document.getElementById('initial-message');
        const versionSubtitle = document.getElementById('version-subtitle');
        const mobileSidebarContainer = document.getElementById('mobile-sidebar-container');
        const mobileSidebarOverlay = document.getElementById('mobile-sidebar-overlay');
        const openMobileSidebarBtn = document.getElementById('open-mobile-sidebar-btn-floating');
        const closeMobileSidebarBtn = document.getElementById('close-mobile-sidebar-btn');
        const quoteModal = document.getElementById('quote-modal');
        const closeQuoteModalBtn = document.getElementById('close-quote-modal-btn');
        const quoteBookSelect = document.getElementById('quote-book-select');
        const quoteChapterSelect = document.getElementById('quote-chapter-select');
        const quoteVerseFromEl = document.getElementById('quote-verse-from');
        const quoteVerseToEl = document.getElementById('quote-verse-to');
        const quoteFontSelect = document.getElementById('quote-font-select');
        const generateAndDownloadBtn = document.getElementById('generate-and-download-btn');
        const quoteLoader = document.getElementById('quote-loader');
        const highlightPopupContainer = document.getElementById('highlight-popup-container');
        const highlightsModal = document.getElementById('highlights-modal');
        const closeHighlightsModalBtn = document.getElementById('close-highlights-modal-btn');
        const highlightsContent = document.getElementById('highlights-content');
        const highlightsCategoryFilter = document.getElementById('highlights-category-filter');
        const mainScrollArea = document.getElementById('main-scroll-area');
        
        // --- Auth DOM Elements ---
        const loginModal = document.getElementById('login-modal');
        const closeLoginModalBtn = document.getElementById('close-login-modal-btn');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const emailLoginBtn = document.getElementById('email-login-btn');
        const emailSignupBtn = document.getElementById('email-signup-btn');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const authError = document.getElementById('auth-error');

        // --- STATE ---
        let currentUser = null;
        let currentFontSize = 1.125;
        let currentFontFamily = 'Tinos';
        let currentAccentColor = { color: '#4f46e5', hover: '#4338ca', glow: 'rgba(79,70,229,0.4)' };
        let currentBook = 'Genesis';
        let currentChapter = '1';
        let currentTranslationName = '';
        let highlights = {};
        let categories = [];
        let staticBookData = {};
        let toastTimeout;
        
        const loaderHTML = `<div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary mx-auto mb-4 drop-shadow-[0_0_8px_var(--color-primary-glow)]"></div><p class="text-sm font-medium text-gray-500 dark:text-gray-400">Loading...</p>`;

        // --- UI Functions ---
        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.textContent = message;
            clearTimeout(toastTimeout);
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- DATA SYNC FUNCTIONS ---
        async function saveData() {
            if (currentUser) {
                await saveDataToFirestore(currentUser.uid);
            } else {
                saveDataToLocalStorage();
            }
        }

        function saveDataToLocalStorage() {
            const settings = {
                translation: document.querySelector('.translation-select').value,
                fontSize: currentFontSize,
                fontFamily: currentFontFamily,
                accentColor: currentAccentColor,
                theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light'
            };
            localStorage.setItem('bible_settings', JSON.stringify(settings));
            localStorage.setItem('bible_highlights', JSON.stringify(highlights));
            localStorage.setItem('bible_categories', JSON.stringify(categories));
        }

        async function saveDataToFirestore(userId) {
            const { db, doc, setDoc } = window.firebase;
            const userDocRef = doc(db, "users", userId);
            const dataToSave = {
                highlights,
                categories,
                settings: {
                    translation: document.querySelector('.translation-select').value,
                    fontSize: currentFontSize,
                    fontFamily: currentFontFamily,
                    accentColor: currentAccentColor,
                    theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light'
                }
            };
            await setDoc(userDocRef, dataToSave, { merge: true });
        }

        async function loadDataForUser(userId) {
            const { db, doc, getDoc } = window.firebase;
            const userDocRef = doc(db, "users", userId);
            const docSnap = await getDoc(userDocRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                highlights = data.highlights || {};
                categories = data.categories || [];
                if (data.settings) {
                    const { translation, fontSize, fontFamily, accentColor, theme } = data.settings;
                    applyTranslation(translation || 'drb', false);
                    if (fontSize) { currentFontSize = fontSize; changeFontSize(0, false); }
                    if (accentColor) applyAccentColor(accentColor, false);
                    applyFontFamily(fontFamily || 'Tinos', false);
                    applyTheme(theme || 'dark', false);
                }
            } else {
                loadDataFromLocalStorage();
                await saveDataToFirestore(userId);
            }
            if (document.getElementById('scripture-display').querySelector('[data-verse-ref]')) {
                getScripture();
            }
        }

        function loadDataFromLocalStorage() {
            const savedSettings = JSON.parse(localStorage.getItem('bible_settings'));
            if (savedSettings) {
                applyTranslation(savedSettings.translation || 'drb', false);
                if (savedSettings.fontSize) { currentFontSize = savedSettings.fontSize; changeFontSize(0, false); }
                if (savedSettings.accentColor) applyAccentColor(savedSettings.accentColor, false);
                applyFontFamily(savedSettings.fontFamily || 'Tinos', false);
                applyTheme(savedSettings.theme || 'dark', false);
            } else {
                applyTranslation('drb', false);
            }
            highlights = JSON.parse(localStorage.getItem('bible_highlights')) || {};
            categories = JSON.parse(localStorage.getItem('bible_categories')) || [];
        }

        // --- AUTH FUNCTIONS ---
        function updateAuthUI(user) {
            const { auth, signOut } = window.firebase;
            const authBtns = document.querySelectorAll('.auth-management-btn');

            if (user) {
                currentUser = user;
                authBtns.forEach(btn => {
                    btn.textContent = `Logout (${user.displayName || user.email})`;
                    btn.classList.remove('btn-primary');
                    btn.classList.add('bg-red-600', 'hover:bg-red-500', 'hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]', 'text-white', 'shadow-3d-btn');
                    btn.onclick = () => signOut(auth);
                });
                loginModal.classList.add('hidden');

        function populateBooks(selectElement) {

        function populateChapters(bookSelect, chapterSelect) {
            const book = bookSelect.value;
            let chapterCount = 0;
            if (BIBLE_BOOKS["Old Testament"][book]) chapterCount = BIBLE_BOOKS["Old Testament"][book];
            else if (BIBLE_BOOKS["New Testament"][book]) chapterCount = BIBLE_BOOKS["New Testament"][book];
            chapterSelect.innerHTML = '';
            for (let i = 1; i <= chapterCount; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Chapter ${i}`;
                chapterSelect.appendChild(option);
            }

        async function parseAndFetchVerse(inputString) {
            if (!inputString) return;

            const allBookNames = [
                ...Object.keys(BIBLE_BOOKS["Old Testament"]),
                ...Object.keys(BIBLE_BOOKS["New Testament"])
            ];
            const sortedBooks = [...allBookNames].sort((a, b) => b.length - a.length);

            let foundBook = null;
            let remainingString = '';

            for (const bookName of sortedBooks) {
                if (inputString.toLowerCase().startsWith(bookName.toLowerCase())) {
                    foundBook = bookName;
                    remainingString = inputString.substring(bookName.length).trim();
                    break;
                }
            }

            if (!foundBook) {
                alert("Could not recognize the book name. Please use a standard name (e.g., Genesis, 1 Corinthians).");
                return;
            }
            
            const parts = remainingString.match(/^(\d+)(?:\s*[:.]\s*(\d+))?/);
            if (!parts || !parts[1]) {
                alert(`Invalid chapter/verse format after "${foundBook}". Please use a format like " 1:15".`);
                return;
            }

            const chapter = parts[1];
            const startVerse = parts[2];

            document.querySelectorAll('.book-select').forEach(select => {
                select.value = foundBook;
                const controlsContainer = select.closest('.space-y-6, .space-y-5');
                const chapterSelect = controlsContainer.querySelector('.chapter-select');
                if (chapterSelect) {
                    populateChapters(select, chapterSelect);
                    chapterSelect.value = chapter;
                }
            });
             document.querySelectorAll('.chapter-select').forEach(select => select.value = chapter);

            currentBook = foundBook;
            currentChapter = chapter;

            await getScripture();

            if (startVerse) {
                setTimeout(() => {
                    const verseRef = `${foundBook} ${chapter}:${startVerse}`;
                    const verseElement = document.querySelector(`[data-verse-ref="${verseRef}"]`);
                    if (verseElement) {
                        verseElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        verseElement.style.transition = 'background-color 0.5s ease';
                        verseElement.style.backgroundColor = 'var(--color-primary-glow)';
                        setTimeout(() => {
                            verseElement.style.backgroundColor = '';
                        }, 2500);
                    }
                }, 500);
            }
        }

        async function getScripture() {
            const controls = document.getElementById('desktop-sidebar-controls').offsetParent ? 
                             document.getElementById('desktop-sidebar-controls') : 
                             document.getElementById('mobile-sidebar-controls');

            currentBook = controls.querySelector('.book-select').value;
            currentChapter = controls.querySelector('.chapter-select').value;
            const translationSelect = controls.querySelector('.translation-select');
            const translation = translationSelect.value;

            if (!currentBook || !currentChapter) return;
            
            if(initialMessage) initialMessage.style.display = 'none';
            scriptureDisplay.innerHTML = `<div class="text-center py-10">${loaderHTML}</div>`;
            
            toggleMobileSidebar(false);
            mainScrollArea.scrollTo({ top: 0, behavior: 'smooth' });

            try {
                let data;
                const selectedOption = translationSelect.options[translationSelect.selectedIndex];

                if (translation === 'cpdv' || translation === 'drb') {
                    const baseUrl = selectedOption.dataset.baseUrl;
                    const bookFileName = `${encodeURIComponent(currentBook)}.json`;
                    const bookUrl = `${baseUrl}/${bookFileName}`;
                    
                    if (!staticBookData[bookUrl]) {
                        scriptureDisplay.innerHTML = `<div class="text-center py-10">${loaderHTML} <p class="text-sm mt-2 text-gray-500">Downloading ${currentBook}...</p></div>`;
                        const response = await fetch(bookUrl);
                        if (!response.ok) throw new Error(`Could not find or download the file for ${currentBook}.`);
                        staticBookData[bookUrl] = await response.json();
                    }

                    const bookData = staticBookData[bookUrl];
                    const chapterData = bookData[currentChapter];

                    if (!chapterData) throw new Error("Chapter not found.");

                    data = {
                        reference: `${currentBook} ${currentChapter}`,
                        translation_name: selectedOption.dataset.name,
                        verses: Object.keys(chapterData).filter(key => !isNaN(key)).map(verseNum => ({
                            verse: verseNum,
                            text: chapterData[verseNum]
                        }))
                    };

                } else {
                    const apiUrl = `https://bible-api.com/${encodeURIComponent(currentBook)}+${currentChapter}?translation=${translation}`;
                    const response = await fetch(apiUrl);
                    if (!response.ok) throw new Error((await response.json()).error || `Network response error`);
                    data = await response.json();
                }

                if (data && data.verses && data.verses.length > 0) {
                    currentTranslationName = data.translation_name;
                    versionSubtitle.textContent = currentTranslationName;
                    document.getElementById('mobile-version-subtitle').textContent = currentTranslationName;
                    let titleHtml = `<h2 class="text-4xl font-bold mb-8 pb-2 text-gray-900 dark:text-white drop-shadow-sm">${data.reference}</h2>`;
                    
                    const chapterHighlights = {};
                    const prefix = `${currentBook} ${currentChapter}:`;
                    for (const ref in highlights) {
                        if (ref.startsWith(prefix)) {
                            const versePart = ref.substring(prefix.length);
                            const [startStr, endStr] = versePart.split('-');
                            const start = parseInt(startStr);
                            const end = endStr ? parseInt(endStr) : start;
                            for (let i = start; i <= end; i++) {
                                chapterHighlights[i] = highlights[ref].color;
                            }
                        }
                    }

                    let versesHtml = '<div class="space-y-6">';
                    data.verses.forEach(verseData => {
                        const verseRef = `${currentBook} ${currentChapter}:${verseData.verse}`;
                        const color = chapterHighlights[verseData.verse];
                        const highlightClass = color ? `highlight-${color}` : '';
                        versesHtml += `<p class="cursor-pointer rounded-2xl p-3 -mx-3 transition-all duration-300 hover:bg-black/5 dark:hover:bg-white/5 ${highlightClass}" data-verse-ref="${verseRef}"><sup class="text-primary font-bold mr-2 text-sm">${verseData.verse}</sup>${verseData.text.replace(/\n/g, ' ').trim()}</p>`;
                    });
                    versesHtml += '</div>';

                    scriptureDisplay.innerHTML = titleHtml + versesHtml;

                    scriptureDisplay.querySelectorAll('[data-verse-ref]').forEach(el => {
                        el.addEventListener('click', showHighlightPopup);
                    });

                } else { throw new Error("Passage not found."); }
            } catch (error) {
                scriptureDisplay.innerHTML = `<div class="text-center p-8 glass-panel border border-red-500/30 mt-4"><h3 class="font-bold text-lg text-red-500 mb-2">Error</h3><p>${error.message}</p></div>`;
            }
        }

        async function generateAndDownloadQuote() {
            const verseFrom = quoteVerseFromEl.value;
            const verseTo = quoteVerseToEl.value || verseFrom;
            if (!verseFrom) { alert('Please enter a starting verse.'); return; }

            const generateBtn = document.getElementById('generate-and-download-btn');
            quoteLoader.innerHTML = loaderHTML;
            quoteLoader.classList.remove('hidden');
            generateBtn.disabled = true;

            const book = quoteBookSelect.value;
            const chapter = quoteChapterSelect.value;
            const verseRange = verseFrom === verseTo ? verseFrom : `${verseFrom}-${verseTo}`;

            try {
                let verseText = '';
                let refText = '';
                let shortVersionName = '';

                const translationSelect = document.getElementById('translation-select-quote');
                const translation = translationSelect.value;
                const selectedOption = translationSelect.options[translationSelect.selectedIndex];

                if (translation === 'drb' || translation === 'cpdv') {
                    const baseUrls = {
                        drb: 'https://exanx.github.io/bible-json/DRB-73-Books',
                        cpdv: 'https://exanx.github.io/bible-json/CPDV-73-Books'
                    };
                    const baseUrl = baseUrls[translation];
                    const bookFileName = `${encodeURIComponent(book)}.json`;
                    const bookUrl = `${baseUrl}/${bookFileName}`;

                    if (!staticBookData[bookUrl]) {
                        const response = await fetch(bookUrl);
                        if (!response.ok) throw new Error(`Could not download the file.`);
                        staticBookData[bookUrl] = await response.json();
                    }

                    const bookData = staticBookData[bookUrl];
                    const chapterData = bookData[chapter];
                    if (!chapterData) throw new Error(`Chapter ${chapter} not found.`);
                    
                    let versesToQuote = [];
                    for (let i = parseInt(verseFrom); i <= parseInt(verseTo); i++) {
                        if (chapterData[i]) versesToQuote.push(chapterData[i]);
                    }
                    if (versesToQuote.length === 0) throw new Error(`Verses not found.`);

                    verseText = versesToQuote.join(' ');
                    shortVersionName = selectedOption.text;
                    refText = `— ${book} ${chapter}:${verseRange} (${shortVersionName})`;
                } else {
                    const apiUrl = `https://bible-api.com/${encodeURIComponent(book)}+${chapter}:${verseRange}?translation=${translation}`;
                    const response = await fetch(apiUrl);
                    if (!response.ok) throw new Error("API Error");
                    const data = await response.json();
                    verseText = data.verses.map(v => v.text.replace(/\n/g, ' ').trim()).join(' ');
                    shortVersionName = selectedOption.text;
                    refText = `— ${data.reference} (${shortVersionName})`;
                }
                
                await downloadCanvasQuote({ text: verseText, ref: refText });
                quoteLoader.classList.add('hidden');

            } catch (error) {
                quoteLoader.innerHTML = `<p class="text-red-500 font-medium">${error.message}</p>`;
            } finally {
                generateBtn.disabled = false;
            }
        }

        async function downloadCanvasQuote(quoteData) {
            const { text, ref } = quoteData;
            const selectedFont = quoteFontSelect.value;
            const minWidth = 1500;
            const minHeight = 1000;
            const padding = 120;
            const textMaxWidth = minWidth - (padding * 2);
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const verseFontSize = 80;
            const verseLineHeight = verseFontSize * 1.4;
            const verseFont = `italic ${verseFontSize}px "${selectedFont}"`;
            const refFontSize = 50;
            const refFont = `${refFontSize}px Inter`;

            try {
                await document.fonts.load(verseFont);
                await document.fonts.load(refFont);
            } catch (err) {}
            
            function wrapText(context, text, x, y, maxWidth, lineHeight, font, color) {
                context.font = font;
                context.fillStyle = color;
                context.textAlign = 'center';
                const words = text.split(' ');
                let line = '';
                let lines = [];
                for(let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    const testWidth = context.measureText(testLine).width;
                    if (testWidth > maxWidth && n > 0) {
                        lines.push(line);
                        line = words[n] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line);
                const totalTextHeight = lines.length * lineHeight;
                let startY = y - (totalTextHeight / 2);
                for(let i = 0; i < lines.length; i++) {
                    context.fillText(lines[i].trim(), x, startY + (i * lineHeight));
                }
                return totalTextHeight;
            }

            ctx.font = verseFont;
            const verseWords = text.split(' ');
            let line = '';
            let lineCount = 1;
            for(let n = 0; n < verseWords.length; n++) {
                const testLine = line + verseWords[n] + ' ';
                if (ctx.measureText(testLine).width > textMaxWidth && n > 0) {
                    lineCount++;
                    line = verseWords[n] + ' ';
                } else {
                    line = testLine;
                }
            }
            const verseBlockHeight = lineCount * verseLineHeight;
            const refBlockHeight = refFontSize * 1.4;
            const totalContentHeight = verseBlockHeight + refBlockHeight + 40;
            
            canvas.width = minWidth;
            canvas.height = Math.max(minHeight, totalContentHeight + (padding * 2));
            
            ctx.fillStyle = document.getElementById('quote-bg-color').value;
            const textColor = document.getElementById('quote-text-color').value;
            
            const hex = ctx.fillStyle.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16) || 0;
            const g = parseInt(hex.substring(2,4), 16) || 0;
            const b = parseInt(hex.substring(4,6), 16) || 0;
            const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            const refColor = luma < 128 ? '#9CA3AF' : '#4B5563';

            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerY = canvas.height / 2;
            const centerX = canvas.width / 2;

            const totalTextHeight = wrapText(ctx, text, centerX, centerY, textMaxWidth, verseLineHeight, verseFont, textColor);
            
            ctx.font = refFont;
            ctx.fillStyle = refColor;
            ctx.textAlign = 'center';
            ctx.fillText(ref, centerX, centerY + (totalTextHeight / 2) + 40);

            const link = document.createElement('a');
            link.download = `bible-quote.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // --- Verse Action Popup & Highlighting ---
        function getVerseRangeText() {
            const fromVerse = parseInt(document.getElementById('popup-verse-from').value);
            const toVerse = parseInt(document.getElementById('popup-verse-to').value);
            if (isNaN(fromVerse) || isNaN(toVerse) || fromVerse > toVerse) return { text: '', reference: '' };

            let verses = [];
            for (let i = fromVerse; i <= toVerse; i++) {
                const verseRef = `${currentBook} ${currentChapter}:${i}`;
                const verseElement = document.querySelector(`[data-verse-ref="${verseRef}"]`);
                if (verseElement) verses.push(verseElement.textContent.replace(/^\d+/, '').trim());
            }
            const verseRangeStr = fromVerse === toVerse ? fromVerse : `${fromVerse}-${toVerse}`;
            return { text: verses.join(' '), reference: `${currentBook} ${currentChapter}:${verseRangeStr}` };
        }

        function showHighlightPopup(e) {
            const verseElement = e.currentTarget;
            const verseRef = verseElement.dataset.verseRef;
            
            const parts = verseRef.match(/(.*?)\s+(\d+):(\d+)/);
            if (!parts) return;
            const book = parts[1], chapter = parts[2], verse = parseInt(parts[3]);

            highlightPopupContainer.dataset.currentBook = book;
            highlightPopupContainer.dataset.currentChapter = chapter;

            const fromInput = document.getElementById('popup-verse-from');
            const toInput = document.getElementById('popup-verse-to');
            fromInput.value = verse;
            toInput.value = verse;
            
            const noteInput = document.getElementById('highlight-note-input');
            const notePreview = document.getElementById('highlight-note-preview');

            let foundHighlight = null, foundRef = '';
            const prefix = `${book} ${chapter}:`;
            for (const ref in highlights) {
                if (ref.startsWith(prefix)) {
                    const versePart = ref.substring(prefix.length);
                    const [startStr, endStr] = versePart.split('-');
                    const start = parseInt(startStr), end = endStr ? parseInt(endStr) : start;
                    if (verse >= start && verse <= end) {
                        foundHighlight = highlights[ref];
                        fromInput.value = start; toInput.value = end;
                        foundRef = ref; break;
                    }
                }
            }
            
            highlightPopupContainer.dataset.originalRef = foundRef;
            updateVerseRefDisplay();
            highlightPopupContainer.classList.remove('hidden');
            
            noteInput.value = foundHighlight?.note || '';
            notePreview.innerHTML = marked.parse(noteInput.value);

            if (noteInput.value) {
                noteInput.classList.add('hidden');
                notePreview.classList.remove('hidden');
            } else {
                noteInput.classList.remove('hidden');
                notePreview.classList.add('hidden');
            }
            
            populateCategorySelect(document.getElementById('highlight-category-select'), foundHighlight?.category);
            
            document.querySelectorAll('#highlight-popup .color-swatch').forEach(swatch => {
                swatch.classList.remove('selected');
                if (foundHighlight && swatch.dataset.color === foundHighlight.color) swatch.classList.add('selected');
            });
        }
        
        function updateVerseRefDisplay() {
            const book = highlightPopupContainer.dataset.currentBook;
            const chapter = highlightPopupContainer.dataset.currentChapter;
            const fromVerse = document.getElementById('popup-verse-from').value;
            const toVerse = document.getElementById('popup-verse-to').value;
            const display = document.getElementById('highlight-verse-ref-display');
            if (!book || !chapter || !fromVerse || !toVerse) return;

            if (parseInt(fromVerse) === parseInt(toVerse)) display.textContent = `${book} ${chapter}:${fromVerse}`;
            else if (parseInt(fromVerse) < parseInt(toVerse)) display.textContent = `${book} ${chapter}:${fromVerse}-${toVerse}`;
            else display.textContent = `${book} ${chapter}:${fromVerse}`;
        }

        function hideHighlightPopup() { highlightPopupContainer.classList.add('hidden'); }

        function saveHighlight() {
            const fromVerse = parseInt(document.getElementById('popup-verse-from').value);
            const toVerse = parseInt(document.getElementById('popup-verse-to').value);
            if (isNaN(fromVerse) || isNaN(toVerse) || fromVerse > toVerse) return;

            const originalRef = highlightPopupContainer.dataset.originalRef;
            const note = document.getElementById('highlight-note-input').value;
            const category = document.getElementById('highlight-category-select').value;
            const selectedColorEl = document.querySelector('#highlight-popup .color-swatch.selected');
            const color = selectedColorEl ? selectedColorEl.dataset.color : 'yellow';

            const newRef = fromVerse === toVerse 
                ? `${currentBook} ${currentChapter}:${fromVerse}` 
                : `${currentBook} ${currentChapter}:${fromVerse}-${toVerse}`;
            
            if (originalRef && originalRef !== newRef) delete highlights[originalRef];
            highlights[newRef] = { color, note, category };
            
            getScripture(); 
            saveData();
            hideHighlightPopup();
        }
        
        function removeHighlight() {
            const originalRef = highlightPopupContainer.dataset.originalRef;
            if (originalRef) delete highlights[originalRef];
            getScripture(); 
            saveData();
            hideHighlightPopup();
        }

        function renderHighlights(filterCategory = null) {
            const allTags = new Set();
            Object.values(highlights).forEach(h => { if (h.category) allTags.add(h.category); });

            const tagsContainer = document.getElementById('highlights-category-filter');
            tagsContainer.innerHTML = `<button class="tag-btn ${!filterCategory ? 'selected' : ''} glass-input text-xs font-bold px-4 py-1.5 rounded-full" data-category="all">All</button>`;
            [...allTags].sort().forEach(tag => {
                tagsContainer.innerHTML += `<button class="tag-btn ${filterCategory === tag ? 'selected' : ''} glass-input text-xs font-bold px-4 py-1.5 rounded-full" data-category="${tag}">${tag}</button>`;
            });
            
            tagsContainer.querySelectorAll('.tag-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const category = e.target.dataset.category;
                    renderHighlights(category === 'all' ? null : category);
                });
            });

            if (Object.keys(highlights).length === 0) {
                highlightsContent.innerHTML = `<p class="text-gray-500 text-center py-10">No highlights found.</p>`;
                return;
            }

            const groupedByBook = {};
            for (const ref in highlights) {
                const highlight = highlights[ref];
                if (filterCategory && highlight.category !== filterCategory) continue;
                const book = ref.substring(0, ref.lastIndexOf(' '));
                if (!groupedByBook[book]) groupedByBook[book] = [];
                groupedByBook[book].push(ref);
            }

            let html = '';
            for (const book in groupedByBook) {
                html += `<h3 class="text-2xl font-bold mt-6 mb-3 text-gray-900 dark:text-white drop-shadow-sm">${book}</h3>`;
                groupedByBook[book].sort((a, b) => {
                    const aParts = a.match(/:(\d+)/), bParts = b.match(/:(\d+)/);
                    return (aParts ? parseInt(aParts[1]) : 0) - (bParts ? parseInt(bParts[1]) : 0);
                }).forEach(ref => {
                    const highlight = highlights[ref];
                    const versePart = ref.substring(ref.lastIndexOf(':') + 1);
                    const firstVerseNum = versePart.split('-')[0];
                    const firstVerseRef = ref.substring(0, ref.lastIndexOf(':') + 1) + firstVerseNum;
                    const verseText = document.querySelector(`[data-verse-ref="${firstVerseRef}"]`)?.textContent.replace(/^\d+/, '').trim() || 'Verse text unavailable without loading chapter.';
                    
                    let categoryHtml = highlight.category ? `<span class="bg-black/5 dark:bg-white/10 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-full border border-gray-200 dark:border-white/10">${highlight.category}</span>` : '';
                    const note = highlight.note || '';
                    
                    html += `
                        <div class="mb-5 p-5 border-l-4 border-${highlight.color}-500 glass-panel rounded-l-none">
                            <div class="flex justify-between items-center mb-2">
                                <p class="font-bold text-gray-800 dark:text-gray-200">${ref}</p>
                                ${categoryHtml}
                            </div>
                            <p class="italic text-gray-600 dark:text-gray-300 mb-3 leading-relaxed">"${verseText}"</p>
                            <div class="note-container mt-3">
                                <textarea class="note-textarea glass-input w-full p-3 rounded-xl text-sm outline-none ${note ? 'hidden' : ''}" data-note-ref="${ref}" placeholder="Add a note...">${note}</textarea>
                                <div class="note-preview prose prose-sm dark:prose-invert max-w-none p-3 glass-input rounded-xl min-h-[44px] cursor-text ${note ? '' : 'hidden'}" data-preview-ref="${ref}">${marked.parse(note)}</div>
                                <button class="save-note-btn mt-3 btn-primary text-xs font-bold py-1.5 px-4 rounded-xl" data-save-ref="${ref}">Save Note</button>
                            </div>
                        </div>
                    `;
                });
            }
            highlightsContent.innerHTML = html;
        }

        function setupDirectVerseSearch() {
            const inputs = document.querySelectorAll('.direct-verse-input');
            const buttons = document.querySelectorAll('.direct-verse-search-btn');

            buttons.forEach(btn => btn.addEventListener('click', (e) => parseAndFetchVerse(e.target.previousElementSibling.value)));
            inputs.forEach(input => {
                input.addEventListener('keypress', e => { if (e.key === 'Enter') parseAndFetchVerse(e.target.value); });
                input.addEventListener('input', e => inputs.forEach(i => { if (i !== e.target) i.value = e.target.value; }));
            });
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            const selectorsTemplate = document.getElementById('selectors-template');
            const optionsTemplate = document.getElementById('options-template');
            const desktopSidebarControls = document.getElementById('desktop-sidebar-controls');
            const mobileSidebarControls = document.getElementById('mobile-sidebar-controls');
            
            desktopSidebarControls.appendChild(selectorsTemplate.content.cloneNode(true));
            const divider = document.createElement('hr'); divider.className = 'border-gray-200/50 dark:border-white/10 my-6';
            desktopSidebarControls.appendChild(divider);
            desktopSidebarControls.appendChild(optionsTemplate.content.cloneNode(true));

            mobileSidebarControls.appendChild(selectorsTemplate.content.cloneNode(true));
            const divider2 = document.createElement('hr'); divider2.className = 'border-gray-200/50 dark:border-white/10 my-6';
            mobileSidebarControls.appendChild(divider2);
            mobileSidebarControls.appendChild(optionsTemplate.content.cloneNode(true));

            const allControls = [desktopSidebarControls, mobileSidebarControls];

            allControls.forEach(container => {
                if (container.querySelector('.book-select')) {
                    populateBooks(container.querySelector('.book-select'));
                    populateChapters(container.querySelector('.book-select'), container.querySelector('.chapter-select'));
                }
            });

            const allBookSelects = document.querySelectorAll('.book-select');
            const allChapterSelects = document.querySelectorAll('.chapter-select');
            const allTranslationSelects = document.querySelectorAll('.translation-select');

            function syncVersionControls(sourceElement) {
                const selectedValue = sourceElement.value;
                allControls.forEach(container => {
                    const select = container.querySelector('.translation-select');
                    if (select) select.value = selectedValue;
                });
                applyTranslation(selectedValue);
            }

            allTranslationSelects.forEach(select => select.addEventListener('change', (e) => syncVersionControls(e.target)));
            allBookSelects.forEach(select => select.addEventListener('change', (e) => {
                const newBook = e.target.value;
                allBookSelects.forEach(s => s.value = newBook);
                allControls.forEach(cont => {
                    if (cont.querySelector('.book-select')) populateChapters(cont.querySelector('.book-select'), cont.querySelector('.chapter-select'));
                });
            }));
            allChapterSelects.forEach(select => select.addEventListener('change', (e) => allChapterSelects.forEach(s => s.value = e.target.value)));
            
            setupDirectVerseSearch();
            
            document.querySelectorAll('.fetch-button').forEach(btn => btn.addEventListener('click', getScripture));
            document.querySelectorAll('.font-increase').forEach(btn => btn.addEventListener('click', () => changeFontSize(0.125)));
            document.querySelectorAll('.font-decrease').forEach(btn => btn.addEventListener('click', () => changeFontSize(-0.125)));
            document.querySelectorAll('.open-quote-modal-btn').forEach(btn => btn.addEventListener('click', openQuoteModal));
            document.querySelectorAll('.theme-toggle').forEach(btn => btn.addEventListener('click', toggleTheme));
            document.querySelectorAll('.font-family-select').forEach(sel => sel.addEventListener('change', (e) => applyFontFamily(e.target.value)));
            document.querySelectorAll('.reset-app-btn').forEach(btn => btn.addEventListener('click', resetApp));
            document.querySelectorAll('.open-highlights-modal-btn-sidebar').forEach(btn => btn.addEventListener('click', openHighlightsModal));
            
            // Accent Picker logic
            document.querySelectorAll('.accent-picker').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    applyAccentColor({
                        color: e.target.dataset.color,
                        hover: e.target.dataset.hover,
                        glow: e.target.dataset.glow
                    });
                });
            });

            openMobileSidebarBtn.addEventListener('click', () => toggleMobileSidebar(true));
            closeMobileSidebarBtn.addEventListener('click', () => toggleMobileSidebar(false));
            mobileSidebarOverlay.addEventListener('click', () => toggleMobileSidebar(false));

            loadDataFromLocalStorage();
            
            allBookSelects.forEach(s => s.value = currentBook);
            allControls.forEach(cont => {
                if (cont.querySelector('.book-select')) {
                    populateChapters(cont.querySelector('.book-select'), cont.querySelector('.chapter-select'));
                    cont.querySelector('.chapter-select').value = currentChapter;
                }
            });
            syncVersionControls(document.querySelector('#desktop-sidebar-controls .translation-select'));

            closeQuoteModalBtn.addEventListener('click', closeQuoteModal);
            generateAndDownloadBtn.addEventListener('click', generateAndDownloadQuote);
            quoteBookSelect.addEventListener('change', () => populateChapters(quoteBookSelect, quoteChapterSelect));

            // Verse Action Popup
            document.getElementById('popup-verse-from').addEventListener('input', updateVerseRefDisplay);
            document.getElementById('popup-verse-to').addEventListener('input', updateVerseRefDisplay);
            document.getElementById('copy-verse-btn').addEventListener('click', () => {
                const { text, reference } = getVerseRangeText();
                if (text) navigator.clipboard.writeText(`"${text}" — ${reference} (${currentTranslationName})`).then(() => showToast('Copied!'));
            });
            document.getElementById('share-verse-btn').addEventListener('click', () => {
                const { text, reference } = getVerseRangeText();
                if (text && navigator.share) navigator.share({ title: reference, text: `"${text}" — ${reference} (${currentTranslationName})` });
            });
            document.getElementById('highlight-popup').addEventListener('click', (e) => {
                if (e.target.closest('.color-swatch')) {
                    document.querySelectorAll('#highlight-popup .color-swatch').forEach(sw => sw.classList.remove('selected'));
                    e.target.closest('.color-swatch').classList.add('selected');
                }
            });
            document.getElementById('save-highlight-btn').addEventListener('click', saveHighlight);
            document.getElementById('remove-highlight-btn').addEventListener('click', removeHighlight);
            document.getElementById('close-highlight-popup').addEventListener('click', hideHighlightPopup);
            document.getElementById('add-category-btn').addEventListener('click', addCategory);

            // WYSIWYG Note listeners
            const noteInput = document.getElementById('highlight-note-input');
            const notePreview = document.getElementById('highlight-note-preview');
            noteInput.addEventListener('input', () => { notePreview.innerHTML = marked.parse(noteInput.value); });
            notePreview.addEventListener('click', () => {
                notePreview.classList.add('hidden'); noteInput.classList.remove('hidden'); noteInput.focus();
            });
            noteInput.addEventListener('blur', () => {
                if(noteInput.value) { noteInput.classList.add('hidden'); notePreview.classList.remove('hidden'); }
            });

            highlightsContent.addEventListener('click', e => {
                if (e.target.matches('.note-preview')) {
                    const ref = e.target.dataset.previewRef;
                    const container = e.target.closest('.note-container');
                    e.target.classList.add('hidden');
                    const textarea = container.querySelector(`.note-textarea[data-note-ref="${ref}"]`);
                    textarea.classList.remove('hidden'); textarea.focus();
                } else if (e.target.matches('.save-note-btn')) {
                    const ref = e.target.dataset.saveRef;
                    const text = e.target.closest('.note-container').querySelector(`.note-textarea[data-note-ref="${ref}"]`).value;
                    if (highlights[ref]) {
                        highlights[ref].note = text; saveData();
                        e.target.textContent = 'Saved!';
                        setTimeout(() => { e.target.textContent = 'Save Note'; }, 2000);
                        renderHighlights();
                    }
                }
            });
            highlightsContent.addEventListener('input', e => {
                if (e.target.matches('.note-textarea')) {
                    e.target.closest('.note-container').querySelector(`.note-preview`).innerHTML = marked.parse(e.target.value);
                }
            });
            highlightsContent.addEventListener('focusout', e => {
                 if (e.target.matches('.note-textarea') && e.target.value) {
                    e.target.classList.add('hidden');
                    e.target.closest('.note-container').querySelector(`.note-preview`).classList.remove('hidden');
                 }
            });

            document.addEventListener('click', (e) => {
                if (!document.getElementById('highlight-popup-container').contains(e.target) && !e.target.closest('[data-verse-ref]')) hideHighlightPopup();
            });
            closeHighlightsModalBtn.addEventListener('click', closeHighlightsModal);
            
            // Auth Listeners
            const { auth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } = window.firebase;
            closeLoginModalBtn.addEventListener('click', () => loginModal.classList.add('hidden'));
            googleLoginBtn.addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()).catch(err => showAuthError(err.message)));
            emailLoginBtn.addEventListener('click', () => signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(err => showAuthError(err.message)));
            emailSignupBtn.addEventListener('click', () => createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(err => showAuthError(err.message)));
            onAuthStateChanged(auth, user => updateAuthUI(user));
        };
    </script>
</body>
</html>
